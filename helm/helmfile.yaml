environments:
  local:
    values:
      - environments/local.yaml
  prod:
    values:
      - environments/prod.yaml

---

releases:
  - name: database
    chart: ./charts/database
    namespace: agent
    values:
      - charts/database/values.yaml
      - environments/{{ .Environment.Name }}.yaml

  - name: llm
    chart: ./charts/llm
    namespace: agent
    installed: {{ .Values.llm.enabled }}
    values:
      - charts/llm/values.yaml
      - environments/{{ .Environment.Name }}.yaml

  - name: agent
    chart: ./charts/agent
    namespace: agent
    values:
      - charts/agent/values.yaml
      - environments/{{ .Environment.Name }}.yaml
