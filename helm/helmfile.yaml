environments:
  local:
    values:
      - environments/local.yaml
  dev:
    values:
      - environments/dev.yaml
  prod:
    values:
      - environments/prod.yaml

---

releases:
  - name: database
    chart: ./charts/database
    namespace: "{{ .Environment.Name }}-agent"
    values:
      - charts/database/values.yaml
      - environments/{{ .Environment.Name }}.yaml

  - name: llm
    chart: ./charts/llm
    namespace: "{{ .Environment.Name }}-agent"
    condition: llm.enabled
    values:
      - charts/llm/values.yaml
      - environments/{{ .Environment.Name }}.yaml

  - name: agent
    chart: ./charts/agent
    namespace: "{{ .Environment.Name }}-agent"
    values:
      - charts/agent/values.yaml
      - environments/{{ .Environment.Name }}.yaml
    hooks:
      - events: ["prepare"]
        command: "../scripts/build-local.sh"
        args: ["{{ .Environment.Name }}", "agent:latest", "../agent"]

  - name: frontend
    chart: ./charts/frontend
    namespace: "{{ .Environment.Name }}-agent"
    values:
      - charts/frontend/values.yaml
      - environments/{{ .Environment.Name }}.yaml
    hooks:
      - events: ["prepare"]
        command: "../scripts/build-local.sh"
        args: ["{{ .Environment.Name }}", "frontend:latest", "../frontend"]

  - name: backend
    chart: ./charts/backend
    namespace: "{{ .Environment.Name }}-agent"
    values:
      - charts/backend/values.yaml
      - environments/{{ .Environment.Name }}.yaml
    hooks:
      - events: ["prepare"]
        command: "../scripts/build-local.sh"
        args: ["{{ .Environment.Name }}", "backend:latest", "../backend"]

  - name: keycloak
    chart: ./charts/keycloak
    namespace: "{{ .Environment.Name }}-agent"
    values:
      - charts/keycloak/values.yaml
      - environments/{{ .Environment.Name }}.yaml

  - name: loadbalancer
    chart: ./charts/loadbalancer
    namespace: "{{ .Environment.Name }}-agent"
    values:
      - charts/loadbalancer/values.yaml
      - environments/{{ .Environment.Name }}.yaml
