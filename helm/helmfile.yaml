environments:
  local:
    values:
      - environments/local.yaml
  dev:
    values:
      - environments/dev.yaml
  prod:
    values:
      - environments/prod.yaml

---

releases:
  - name: database
    chart: ./charts/database
    namespace: {{ .Environment.Name }}-agent
    values:
      - charts/database/values.yaml
      - environments/{{ .Environment.Name }}.yaml

  - name: llm
    chart: ./charts/llm
    namespace: {{ .Environment.Name }}-agent
    condition: llm.enabled
    values:
      - charts/llm/values.yaml
      - environments/{{ .Environment.Name }}.yaml

  - name: agent
    chart: ./charts/agent
    namespace: {{ .Environment.Name }}-agent
    values:
      - charts/agent/values.yaml
      - environments/{{ .Environment.Name }}.yaml
