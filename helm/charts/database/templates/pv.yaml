{{- if eq .Values.database.storageClassName "" }}
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ .Release.Namespace }}-mongo-data
spec:
  capacity:
    storage: {{ .Values.database.storage }}
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/{{ .Release.Namespace }}/mongo
  claimRef:
    namespace: {{ .Release.Namespace }}
    name: {{ .Release.Namespace }}-mongo-data
{{- end }}
