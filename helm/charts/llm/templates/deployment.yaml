apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm
  template:
    metadata:
      labels:
        app: llm
    spec:
      initContainers:
        - name: pull-model
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              ollama serve &
              until ollama list >/dev/null 2>&1; do sleep 1; done
              ollama pull {{ .Values.llm.model }}
          env:
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
          volumeMounts:
            - name: models
              mountPath: /root/.ollama/models
      containers:
        - name: llm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
          volumeMounts:
            - name: models
              mountPath: /root/.ollama/models
          resources:
            limits:
              cpu: "2"
          readinessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llm-models
