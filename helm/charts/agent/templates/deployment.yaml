apiVersion: batch/v1
kind: Job
metadata:
  name: agent
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: agent
    spec:
      restartPolicy: OnFailure
      initContainers:
        {{- if .Values.llm.enabled }}
        - name: wait-for-llm
          image: busybox
          command:
            - sh
            - -c
            - until wget -qO- http://llm:11434/api/tags 2>/dev/null | grep -q "{{ .Values.llm.model }}"; do sleep 5; done
        {{- end }}
        - name: wait-for-mongo
          image: busybox
          command:
            - sh
            - -c
            - until nc -z mongo 27017; do sleep 2; done
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            - name: MODEL
              value: {{ .Values.llm.model | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: ANTHROPIC_API_KEY
            - name: LLM_URL
              value: {{ .Values.llm.url | quote }}
            - name: MONGO_URL
              value: {{ .Values.mongo.url | quote }}
            - name: QUERY
              value: {{ .Values.query | quote }}
