apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent
  template:
    metadata:
      labels:
        app: agent
    spec:
      initContainers:
        {{- if .Values.llm.enabled }}
        - name: wait-for-llm
          image: busybox
          command:
            - sh
            - -c
            - until wget -qO- http://llm:11434 >/dev/null 2>&1; do sleep 2; done
        {{- end }}
        - name: wait-for-mongo
          image: busybox
          command:
            - sh
            - -c
            - until nc -z mongo 27017; do sleep 2; done
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LLM_PROVIDER
              value: {{ .Values.env.LLM_PROVIDER | quote }}
            - name: MODEL
              value: {{ .Values.env.MODEL | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agent-secrets
                  key: ANTHROPIC_API_KEY
            - name: LLM_URL
              value: {{ .Values.env.LLM_URL | quote }}
            - name: MONGO_URL
              value: {{ .Values.env.MONGO_URL | quote }}
            - name: QUERY
              value: {{ .Values.env.QUERY | quote }}
