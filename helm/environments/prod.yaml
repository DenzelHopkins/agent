database:
  storage: 50Gi
  storageClassName: gp3

llm:
  enabled: false
  model: "qwen3:8b"
  storage: 100Gi

image:
  pullPolicy: Always
env:
  LLM_PROVIDER: "anthropic"
  MODEL: "claude-sonnet-4-6"
  LLM_URL: "http://llm:11434"
  MONGO_URL: "mongodb://mongo:27017"
  QUERY: "Search the internet for the promises of Friedrich Merz."
